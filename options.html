<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini QuickPaste Options</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
      max-width: 440px;
    }

    label {
      display: block;
      margin-top: 16px;
    }

    button {
      margin-top: 18px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #555;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      color: #070;
    }

    .status.error {
      color: #b00;
    }
  </style>
</head>
<body>
  <h1>Gemini QuickPaste</h1>

  <div class="hint">API key is embedded in the extension source (background.js).</div>
  <div class="hint">Model is hardcoded to: <strong>gemma-3-27b-it</strong>.</div>

  <label>
    Prompt Prefix (optional)
    <textarea id="promptPrefix" rows="3" placeholder="e.g. Provide a concise answer without extra explanations:"></textarea>
  </label>
  <div class="hint">Text to prepend to your selected text when sending to Gemini. Leave blank for no prefix.</div>

  <button id="saveBtn">Save</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
